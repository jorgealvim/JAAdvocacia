<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro PF/PJ - Nova Pasta</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Jorge Alvim Advocacia</h1>
        <nav>
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="servicos.html">Serviços</a></li>
                <li><a href="sobre.html">Sobre</a></li>
                <li><a href="contato.html">Contato</a></li>
                <li><a href="admin.html">Administrador</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="cadastro-section" style="display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 60vh;">
            <div class="cadastro-box" style="width: 100%; max-width: 600px; min-width: 320px; margin-bottom: 24px;">
                <h2 style="color:#3949ab; text-align:center; margin-bottom:24px;">Cadastro de Pessoa Física/Jurídica</h2>
                <div style="display: flex; gap: 16px; margin-bottom: 24px;">
                    <label style="font-weight:600; font-size:1.1em;">Tipo de Cadastro:</label>
                    <input type="radio" name="tipoPessoa" id="radioCPF" value="cpf" checked>
                    <label for="radioCPF">CPF</label>
                    <input type="radio" name="tipoPessoa" id="radioCNPJ" value="cnpj">
                    <label for="radioCNPJ">CNPJ</label>
                </div>
                <form id="formCadastro">
                    <label>Nome:</label><input type="text" name="nome" required>
                    <label>CPF:</label><input type="text" name="cpf" id="inputCPF">
                    <label>CNPJ:</label><input type="text" name="cnpj" id="inputCNPJ">
                    <label>Identidade:</label><input type="text" name="identidade">
                    <label>Data de Nascimento:</label><input type="date" name="dataNascimento">
                    <label>Nome do Pai:</label><input type="text" name="pai">
                    <label>Nome da Mãe:</label><input type="text" name="mae">
                    <label>Endereço Completo:</label><input type="text" name="enderecoCompleto">
                    <label>Rua:</label><input type="text" name="rua">
                    <label>Número:</label><input type="text" name="numero">
                    <label>Bairro:</label><input type="text" name="bairro">
                    <label>Cidade:</label><input type="text" name="cidade">
                    <label>Estado:</label><input type="text" name="estado">
                    <label>CEP:</label><input type="text" name="cep">
                    <label>E-mail:</label><input type="email" name="email">
                    <label>WhatsApp:</label><input type="text" name="whatsapp">
                    <label>Senha:</label><input type="password" name="senha" required>
                    <label>Confirmar Senha:</label><input type="password" name="confirmaSenha" required>
                    <button type="submit" style="margin-top:16px;">Salvar Cadastro</button>
                </form>
            </div>
        </section>
    </main>
    <script src="cadastroPF-PJ-nova.js"></script>
    <footer>
        <p>&copy; 2026 Jorge Alvim Advocacia. Todos os direitos reservados.</p>
    </footer>
</body>
</html>
