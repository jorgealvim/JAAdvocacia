<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastre-se - Jorge Alvim Advocacia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Jorge Alvim Advocacia</h1>
        <nav>
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="servicos.html">Serviços</a></li>
                <li><a href="sobre.html">Sobre</a></li>
                <li><a href="contato.html">Contato</a></li>
                <li><a href="cadastre-se.html">Cadastre-se</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section style="display: flex; flex-direction: row; justify-content: center; align-items: flex-start; gap: 32px; flex-wrap: wrap; min-height: 60vh;">
            <aside class="cadastro-box" style="width: 320px; min-height: 350px; margin-bottom: 24px;">
                <h2 style="margin-bottom: 16px;">Login</h2>
                <form id="login-form" style="width: 100%;">
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" name="email" autocomplete="email" required style="width: 100%; margin-bottom: 36px; height: 60px; font-size: 2em;">
                    <label for="senha">Senha:</label>
                    <input type="password" id="senha" name="senha" autocomplete="current-password" required style="width: 100%; margin-bottom: 36px; height: 60px; font-size: 2em;">
                    <button type="submit" class="btn-primary" style="width: 100%; margin-bottom: 36px; height: 60px; font-size: 2em;">Entrar</button>
                </form>
                <button id="google-login" class="btn-google" style="width: 100%; margin-bottom: 12px;">Entrar com Google</button>
                <a href="#" id="esqueci-senha" class="link-aux">Esqueci minha senha</a>
            </aside>
            <div id="cadastro-box" class="cadastro-box" style="width: 100%; max-width: 600px; min-width: 320px; margin-bottom: 24px;"></div>
        </section>
    </main>
    <script src="cadastre-se.js"></script>
    <footer>
        <p>&copy; 2026 Jorge Alvim Advocacia. Todos os direitos reservados.</p>
    </footer>
</body>
</html>
